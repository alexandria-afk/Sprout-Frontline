name: frontline_app
description: "Frontline Operations Platform by Sprout Solutions — Phase 1"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management (manual providers — no code generation at scaffold)
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # HTTP client
  dio: ^5.7.0

  # Supabase
  supabase_flutter: ^2.9.0

  # Offline / local storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Connectivity
  connectivity_plus: ^6.1.3

  # Background tasks
  workmanager: ^0.5.2

  # Secure storage (JWT)
  flutter_secure_storage: ^9.2.4

  # Utilities
  shared_preferences: ^2.3.4
  intl: ^0.20.2
  json_annotation: ^4.9.0
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  geolocator: ^13.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Note: riverpod_generator and hive_generator conflict on source_gen versions at scaffold.
  # Using manual Riverpod providers and Hive TypeAdapters for Phase 1.
  # Re-add code generators once package incompatibilities are resolved upstream.
  json_serializable: ^6.9.0
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
